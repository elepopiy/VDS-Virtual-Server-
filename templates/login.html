<!-- templates/login.html -->
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discell | Giriş Yap</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #0b0c10;
            color: #f2f3f5;
            font-family: 'Inter', sans-serif;
        }
        .card {
            background: #14161d;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 20px;
        }
        .btn-glow {
            background: linear-gradient(135deg, #7b2cbf, #9b51e0);
            color: white !important;
            border: none;
            border-radius: 12px;
            font-weight: 600;
        }
        .muted {
            color: #a3a7ae;
        }
        .brand {
            color: #00f2fe;
        }
        .form-control {
            background: #0f1117;
            border: 1px solid rgba(255,255,255,0.08);
            color: #f2f3f5;
            border-radius: 12px;
        }
        .form-control:focus {
            background: #0f1117;
            color: #f2f3f5;
            border-color: #00f2fe;
            box-shadow: 0 0 0 0.2rem rgba(0,242,254,0.12);
        }
        a {
            text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center align-items-center min-vh-100">
        <div class="col-md-6 col-lg-5">
            <div class="text-center mb-4">
                <h1 class="fw-bold">DIS<span class="brand">CELL</span></h1>
                <p class="muted mb-0">Hesabına giriş yap</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} mb-3">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <div class="card shadow-lg p-4">
                <form method="POST" action="/login">
                    <div class="mb-3">
                        <label class="form-label">E-posta</label>
                        <input type="email" name="email" class="form-control" placeholder="ornek@mail.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Şifre</label>
                        <input type="password" name="password" class="form-control" placeholder="Şifren" required>
                    </div>
                    <button type="submit" class="btn btn-glow w-100 py-2">Giriş Yap</button>
                </form>

                <div class="text-center mt-3">
                    <span class="muted">Hesabın yok mu?</span>
                    <a href="/register" class="brand fw-semibold"> Kayıt ol</a>
                </div>
                <div class="text-center mt-2">
                    <a href="/" class="muted">Ana sayfaya dön</a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
